seed: 42
num_scenarios: 5
max_steps: 500
simulation_dir: "output/tst"

randomization:
  num_trains:
    min: 2
    max: 8
  grid_width:
    min: 20
    max: 50
  grid_height:
    min: 20
    max: 50
  num_cities:
    min: 2
    max: 5
  max_rails_between_cities:
    min: 1
    max: 3
  max_rail_pairs_in_city:
    min: 1
    max: 3

# Weights controlling the distribution of planned actions for MOVING/STOPPED agents.
# Only valid actions (determined by rail topology) are considered at each step;
# their weights are extracted from this map and normalised on the fly.
# Omit or leave empty for uniform random selection.
action_weights:
  left: 1.0       # action 1
  forward: 1.0    # action 2
  right: 1.0      # action 3
  stop: 1.0       # action 4
